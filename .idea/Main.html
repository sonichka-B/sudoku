<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Crazy Sudoku</title>
    <link href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="styleFile.css">

</head>
<body>
  <p class="dificulty"></p>
  <div class="grid-window">
  <div id="pivot-container" ></div>
  </div>
  <div id="buttons">
    <span class="toolbar">
      <button class="eraser">🧹</button>
      <button class="var" data-id="1">1</button>
      <button class="var" data-id="2">2</button>
      <button class="var" data-id="3">3</button>
      <button class="var" data-id="4">4</button>
      <button class="var" data-id="5">5</button>
      <button class="var" data-id="6">6</button>
      <button class="var" data-id="7">7</button>
      <button class="var" data-id="8">8</button>
      <button class="var" data-id="9">9</button>
      <button class="hint">💡</button>

    </span>
</div>
  <script src="https://cdn.webdatarocks.com/latest/webdatarocks.toolbar.min.js"></script>
  <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
  <script src="jsfile.js"></script>

</body>
</html>
